name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  build:
    name: Build - ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
          - platform: linux
            os: ubuntu-22.04
          - platform: macos
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install uv

      - name: Set version
        shell: bash
        run: |
          echo "MANGAEASY_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Sanity check package
        run: |
          uv run python -m compileall -q mangaeasy
          uv run mangaeasy --version

      - name: Build standalone app
        run: uv run pyinstaller packaging/mangaeasy.spec --distpath dist --workpath build-tmp --noconfirm --clean

      - name: Install Inno Setup
        if: matrix.platform == 'windows'
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Create Windows installer
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=$env:MANGAEASY_VERSION" "packaging\mangaeasy.iss"

      - name: Package Windows portable
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Compress-Archive -Path "dist\mangaEasy\*" -DestinationPath "release-assets\mangaEasy-windows.zip" -Force
          Copy-Item "dist\mangaEasy-Setup-$env:MANGAEASY_VERSION.exe" "release-assets\"

      - name: Package Linux portable
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          mkdir -p release-assets
          tar -C dist -czf "release-assets/mangaEasy-linux.tar.gz" mangaEasy

      - name: Package macOS portable
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          mkdir -p release-assets
          if [ -d "dist/mangaEasy.app" ]; then
            tar -C dist -czf "release-assets/mangaEasy-macos.tar.gz" mangaEasy.app
          else
            tar -C dist -czf "release-assets/mangaEasy-macos.tar.gz" mangaEasy
          fi

      - name: Upload build assets
        uses: actions/upload-artifact@v4
        with:
          name: mangaeasy-${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: mangaEasy ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-assets/**/*
          body: |
            ## mangaEasy ${{ github.ref_name }}

            Python + uv build. No Rust/Tauri wrapper is used.

            ### Downloads

            #### Windows
            - `mangaEasy-Setup-*.exe` - installer
            - `mangaEasy-windows.zip` - portable folder

            #### Linux
            - `mangaEasy-linux.tar.gz` - portable folder

            #### macOS
            - `mangaEasy-macos.tar.gz` - portable app/folder

            Double-click the app or run `mangaeasy app` to open the control center.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
