name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create a GitHub Release and upload assets

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: mangaEasy-windows.zip
          - os: ubuntu-latest
            artifact_name: mangaEasy-linux.tar.gz
          - os: macos-latest
            artifact_name: mangaEasy-macos.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Install Python via uv
        run: uv python install

      - name: Install project dependencies (including dev for PyInstaller)
        run: uv sync --frozen --dev --no-extra deepspeed

      - name: Build standalone bundle
        run: uv run pyinstaller packaging/mangaeasy.spec --distpath dist --workpath build-tmp --noconfirm

      # ── Windows: portable zip ──────────────────────────────────────────────
      - name: Package portable zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\mangaEasy -DestinationPath ${{ matrix.artifact_name }} -Force

      # ── Windows: Inno Setup installer → mangaEasy-Setup-vX.Y.Z.exe ────────
      - name: Build Windows installer (Inno Setup)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$version" `
            "packaging\mangaeasy.iss"

      - name: Upload installer artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: mangaEasy-Setup
          path: dist/mangaEasy-Setup-*.exe

      # ── Linux / macOS: tar.gz ──────────────────────────────────────────────
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.artifact_name }} -C dist mangaEasy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: "mangaEasy ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## mangaEasy ${{ github.ref_name }}

            ### Download

            | Platform | File | Notes |
            |---|---|---|
            | **Windows — Installer** | `mangaEasy-Setup-${{ github.ref_name }}.exe` | Run the installer — installs to Program Files, adds Start Menu shortcut |
            | **Windows — Portable** | `mangaEasy-windows.zip` | Extract anywhere, double-click `mangaeasy.exe` — no install needed |
            | **Linux (x64)** | `mangaEasy-linux.tar.gz` | `tar -xzf …`, then `./mangaEasy/mangaeasy` |
            | **macOS** | `mangaEasy-macos.tar.gz` | `tar -xzf …`, then `./mangaEasy/mangaeasy` |

            ### First run

            1. **Windows**: run the installer **or** extract the portable zip and double-click `mangaeasy.exe`.
            2. **Linux/macOS**: `chmod +x mangaEasy/mangaeasy && ./mangaEasy/mangaeasy`
            3. The control centre opens in your browser at `http://127.0.0.1:5000`.
            4. Use the **Setup** tab to download ffmpeg and the AI voice tools on first launch.

            > **Python and uv are not required** — everything is bundled inside the download.

            ### System requirements
            - Windows 10/11, Ubuntu 20.04+, or macOS 12+
            - ffmpeg — downloaded automatically on first launch
            - NVIDIA GPU — optional; needed only for IndexTTS voice cloning (Kokoro TTS runs on CPU)
          files: |
            artifacts/mangaEasy-Setup-*.exe
            artifacts/mangaEasy-windows.zip
            artifacts/mangaEasy-linux.tar.gz
            artifacts/mangaEasy-macos.tar.gz
