name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  build:
    name: Build - ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    # The Intel-mac build is best-effort: if GitHub retires the runner label
    # or the build breaks, the release still ships for the other platforms.
    continue-on-error: ${{ matrix.optional == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
          - platform: linux
            os: ubuntu-22.04
          - platform: macos-arm64
            os: macos-latest
          - platform: macos-intel
            os: macos-15-intel
            optional: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install uv

      - name: Set version
        shell: bash
        run: |
          echo "MANGAEASY_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # The tag is the single source of truth for a release's version —
      # refuse to build if the sources disagree with it.
      - name: Check versions are in sync with the tag
        shell: bash
        run: |
          set -e
          tag="${GITHUB_REF_NAME#v}"
          py=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          init=$(python -c "import re;print(re.search(r'__version__ = \"(.+?)\"', open('mangaeasy/__init__.py').read()).group(1))")
          echo "tag=$tag pyproject=$py __init__=$init"
          if [ "$tag" != "$py" ] || [ "$tag" != "$init" ]; then
            echo "::error::Version mismatch: tag v$tag vs pyproject $py vs __init__ $init. Run scripts/release.py first."
            exit 1
          fi

      - name: Sync Python dependencies
        run: uv sync --group dev

      - name: Lint + tests
        run: |
          uv run ruff check .
          uv run python -m compileall -q mangaeasy
          uv run pytest

      # Freeze the CLI (packaging/mangaeasy.spec, excludes torch/transformers —
      # those stay in isolated install-tool envs). Produces dist/mangaEasy/ on
      # Windows/Linux and dist/mangaEasy.app/ on macOS. ffmpeg/uv/git-lfs are
      # NOT bundled: `mangaeasy bootstrap-tools` downloads them on first use.
      - name: Build frozen CLI (PyInstaller)
        run: uv run pyinstaller packaging/mangaeasy.spec

      # The frozen backend must at least answer --version and doctor --json.
      - name: Smoke-test frozen backend
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            backend="dist/mangaEasy.app/Contents/MacOS/mangaeasy"
          elif [ "$RUNNER_OS" = "Windows" ]; then
            backend="dist/mangaEasy/mangaeasy.exe"
          else
            backend="dist/mangaEasy/mangaeasy"
          fi
          "$backend" --version
          "$backend" doctor --json | python -c "import json,sys; json.loads(sys.stdin.read().strip().splitlines()[-1]); print('doctor JSON ok')"

      - name: Package release archive
        shell: bash
        run: |
          mkdir -p release-assets
          if [ "$RUNNER_OS" = "macOS" ]; then
            ( cd dist && zip -qry "../release-assets/mangaeasy-${{ matrix.platform }}.zip" mangaEasy.app )
          elif [ "$RUNNER_OS" = "Windows" ]; then
            7z a -tzip "release-assets/mangaeasy-${{ matrix.platform }}.zip" "./dist/mangaEasy/*" >/dev/null
          else
            ( cd dist && tar czf "../release-assets/mangaeasy-${{ matrix.platform }}.tar.gz" mangaEasy )
          fi

      - name: Upload build assets
        uses: actions/upload-artifact@v4
        with:
          name: mangaeasy-${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: ${{ matrix.optional == true && 'warn' || 'error' }}

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    # Publish as long as the required platforms built (the optional
    # Intel-mac job may be missing).
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    steps:
      - name: Download build assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: mangaEasy ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-assets/**/*
          body: |
            ## mangaEasy ${{ github.ref_name }}

            **mangaEasy is a CLI + MCP tool for LLM agents — there is no GUI.**
            These are self-contained frozen builds of the `mangaeasy` CLI — no
            system Python needed. On first use, `mangaeasy bootstrap-tools`
            downloads core tools (ffmpeg and friends) into the install's own
            data folder; nothing is installed system-wide. (You can also just
            `uv tool install git+https://github.com/tawhidUnhappy/mangaEasy.git`.)

            GPU acceleration (NVIDIA CUDA, Apple Silicon) is detected
            automatically; everything falls back to CPU.

            See [CHANGELOG.md](https://github.com/tawhidUnhappy/mangaEasy/blob/main/CHANGELOG.md)
            for what changed, and [START_HERE.md](https://github.com/tawhidUnhappy/mangaEasy/blob/main/START_HERE.md)
            to get oriented.

            ### Downloads

            Each archive contains the `mangaeasy` executable. Unpack it and run
            `mangaeasy --help` (or `mangaeasy mcp` to serve an agent host).

            - **Windows** — `mangaeasy-windows.zip`. SmartScreen may warn
              because the build is unsigned; click **More info → Run anyway**.
            - **macOS** — `mangaeasy-macos-arm64.zip` (Intel included when
              available). Unsigned, so first run needs
              `xattr -cr mangaEasy.app`.
            - **Linux** — `mangaeasy-linux.tar.gz`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
